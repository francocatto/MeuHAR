<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAR - Edge AI Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }

        .container {
            width: 90%; max-width: 450px;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--accent-color); }
        p.subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.85rem; }

        #status-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.1em; }
        #activity-result { font-size: 2.2rem; font-weight: 800; display: block; margin: 0.5rem 0; color: var(--success); }
        #confidence-result { font-size: 1rem; color: var(--accent-color); opacity: 0.9; }

        .btn-start {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none; padding: 1.2rem;
            font-size: 1rem; font-weight: 700;
            border-radius: 0.75rem; cursor: pointer;
            width: 100%; transition: all 0.2s;
        }

        .btn-start:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-start:disabled { background: #475569; cursor: not-allowed; transform: none; }

        #log { margin-top: 1.5rem; font-size: 0.7rem; color: var(--text-secondary); font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Edge AI - Meu Monitor HAR</h1>
        <p class="subtitle">Classificação de Atividade via Acelerômetro</p>

        <div id="status-card">
            <span class="label">Atividade Atual</span>
            <span id="activity-result">---</span>
            <span id="confidence-result">Aguardando início...</span>
        </div>

        <button id="btnStart" class="btn-start">Iniciar Sensores</button>

        <div id="log">Carregando motor de IA...</div>
    </div>

    <script>
        let model;
        let sensor;
        let sensorBuffer = [];
        const SAMPLES_LIMIT = 200; // 200 amostras (X, Y, Z)
        
        // Mapeamento de classes (ajuste conforme seu modelo)
        const LABELS = ['Caminhando', 'Subindo Escada', 'Descendo Escada', 'Sentado', 'Em Pé', 'Correndo'];

        const btnStart = document.getElementById('btnStart');
        const activityEl = document.getElementById('activity-result');
        const confidenceEl = document.getElementById('confidence-result');
        const logEl = document.getElementById('log');

        async function init() {
            try {
                // Tenta carregar como GraphModel (mais comum para modelos convertidos que dão erro de InputLayer)
                model = await tf.loadGraphModel('./tfjs_model/model.json');
                logEl.innerText = "Modelo de Grafo carregado.";
            } catch (e) {
                console.log("Tentando carregar como LayersModel...");
                try {
                    model = await tf.loadLayersModel('./tfjs_model/model.json');
                    logEl.innerText = "Modelo de Camadas carregado.";
                } catch (err) {
                    logEl.innerText = "Erro crítico: " + err.message;
                }
            }
        }

        async function predict() {
            if (!model) return;

            // Transforma o buffer em Tensor [1, 200, 3]
            const inputTensor = tf.tidy(() => {
                return tf.tensor3d(sensorBuffer, [1, SAMPLES_LIMIT, 3]);
            });

            // Executa a inferência
            const prediction = model.predict(inputTensor);
            const scores = await prediction.data();
            
            const maxIdx = scores.indexOf(Math.max(...scores));
            const conf = (scores[maxIdx] * 100).toFixed(1);

            // Atualiza Interface
            activityEl.innerText = LABELS[maxIdx] || "Desconhecido";
            confidenceEl.innerText = `Confiança: ${conf}%`;

            // Limpeza de memória
            inputTensor.dispose();
            prediction.dispose();
        }

        async function startSensors() {
            if (!('LinearAccelerationSensor' in window)) {
                alert("API de Sensores não suportada. Use Chrome no Android ou habilite flags no Desktop.");
                return;
            }

            try {
                sensor = new LinearAccelerationSensor({ frequency: 20 });
                
                sensor.addEventListener('reading', () => {
                    sensorBuffer.push(sensor.x, sensor.y, sensor.z);

                    // Se o buffer atingir 200 amostras (cada amostra tem 3 eixos)
                    if (sensorBuffer.length >= SAMPLES_LIMIT * 3) {
                        predict();
                        sensorBuffer = []; // Reset para a próxima janela
                    }
                });

                sensor.start();
                btnStart.disabled = true;
                btnStart.innerText = "Monitorando...";
                logEl.innerText = "Processando dados a 20Hz";
            } catch (err) {
                logEl.innerText = "Erro nos sensores: " + err.message;
            }
        }

        btnStart.addEventListener('click', () => {
            // Solicitação de permissão necessária para iOS e navegadores modernos
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => {
                    if (response == 'granted') startSensors();
                });
            } else {
                startSensors();
            }
        });

        init();
    </script>
</body>
</html>
