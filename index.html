<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuHAR - Edge AI Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        #status-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px dashed var(--accent-color);
        }

        .activity-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.5rem;
        }

        #activity-result {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            margin-bottom: 0.5rem;
            color: var(--success);
        }

        #confidence-result {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent-color);
        }

        .btn-start {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #7dd3fc;
            transform: scale(1.02);
        }

        .btn-start:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .log {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MeuHAR - Meu Monitor HAR Edge AI</h1>
        <p class="subtitle">Processamento em Tempo Real (Inference on Edge)</p>

        <div id="status-card">
            <span class="activity-label">Atividade Detectada</span>
            <span id="activity-result">---</span>
            <span id="confidence-result">Aguardando Sensores...</span>
        </div>

        <button id="btnStart" class="btn-start">Iniciar Sensores</button>

        <div id="log" class="log">Modelo não carregado</div>
    </div>

    <script>
    let model;
    let sensor;
    let sensorBuffer = [];
    const SAMPLES_LIMIT = 200; 
    const FREQUENCY = 20;      

    // --- 1. VALORES DO SEU Z-SCALE (Substitua pelos valores exatos do seu print do Colab) ---
    const MEAN = { x: 1.00113179, y: 7.48309389, z: 0.41685324 };
    const STD = { x: 6.64743594, y: 6.79474915, z: 4.93330347 };

    const LABELS = ['Caminhando', 'Subindo Escadas', 'Descendo Escadas', 'Sentado', 'Em Pé', 'Correndo'];

    const btnStart = document.getElementById('btnStart');
    const activityEl = document.getElementById('activity-result');
    const confidenceEl = document.getElementById('confidence-result');
    const logEl = document.getElementById('log');

    async function loadModel() {
        try {
            logEl.innerText = "Carregando modelo...";
            model = await tf.loadLayersModel('./tfjs_model/model.json');
            logEl.innerText = "Modelo pronto para inferência!";
        } catch (err) {
            logEl.innerText = "Erro ao carregar modelo: " + err.message;
        }
    }

    async function runInference() {
        if (!model) return;

        try {
            const inputTensor = tf.tidy(() => {
                return tf.tensor3d(sensorBuffer, [1, SAMPLES_LIMIT, 3]);
            });

            const prediction = model.predict(inputTensor);
            const scores = await prediction.data();
            
            const maxScoreIndex = scores.indexOf(Math.max(...scores));
            const confidence = (scores[maxScoreIndex] * 100).toFixed(1);

            activityEl.innerText = LABELS[maxScoreIndex] || `Classe ${maxScoreIndex}`;
            confidenceEl.innerText = `Confiança: ${confidence}%`;

            inputTensor.dispose();
            prediction.dispose();
        } catch (err) {
            logEl.innerText = "Erro na inferência: " + err.message;
        }
    }

    async function startSensors() {
        // Mudamos para Accelerometer para bater com os dados do WISDM
        if (!('Accelerometer' in window)) {
            alert("Acelerômetro não suportado. Tente usar o Chrome no Android.");
            return;
        }

        try {
            const permission = await navigator.permissions.query({ name: 'accelerometer' });
            if (permission.state === 'denied') {
                alert("Acesso negado.");
                return;
            }

            sensor = new Accelerometer({ frequency: FREQUENCY });

            sensor.addEventListener('reading', () => {
                // --- 2. APLICAÇÃO DO Z-SCALE EM TEMPO REAL ---
                let normX = (sensor.x - MEAN.x) / STD.x;
                let normY = (sensor.y - MEAN.y) / STD.y;
                let normZ = (sensor.z - MEAN.z) / STD.z;

                sensorBuffer.push(normX, normY, normZ);

                // Feedback visual de coleta
                if (sensorBuffer.length % 30 === 0) {
                    logEl.innerText = `Processando: ${Math.floor(sensorBuffer.length / 3)} / 200 amostras`;
                }

                if (sensorBuffer.length >= SAMPLES_LIMIT * 3) {
                    runInference();
                    sensorBuffer = []; 
                }
            });

            sensor.addEventListener('error', event => {
                logEl.innerText = "Erro: " + event.error.name;
            });

            sensor.start();
            btnStart.disabled = true;
            btnStart.innerText = "Monitorando...";

        } catch (error) {
            logEl.innerText = "Erro: " + error.message;
        }
    }

    btnStart.addEventListener('click', () => {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') startSensors();
                })
                .catch(console.error);
        } else {
            startSensors();
        }
    });

    loadModel();
</script>
</body>
</html>
