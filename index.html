<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuHAR - Edge AI Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --warning: #fbbf24;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        #status-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px dashed var(--accent-color);
        }

        .activity-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 0.5rem;
        }

        #activity-result {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
            margin-bottom: 0.5rem;
            color: var(--success);
            transition: color 0.3s;
        }

        #confidence-result {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent-color);
        }

        .btn-start {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #7dd3fc;
            transform: scale(1.02);
        }

        .btn-start:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .log {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MeuHAR - Monitor HAR Edge AI</h1>
        <p class="subtitle">Processamento em Tempo Real (Sliding Window)</p>

        <div id="status-card">
            <span class="activity-label">Atividade Detetada</span>
            <span id="activity-result">---</span>
            <span id="confidence-result">A aguardar sensores...</span>
        </div>

        <button id="btnStart" class="btn-start">Iniciar Sensores</button>

        <div id="log" class="log">Modelo não carregado</div>
    </div>

    <script>
    // --- VARIÁVEIS GLOBAIS ---
    let model;
    let sensor;
    let sensorBuffer = [];
    let wakeLock = null;
    
    // Controles da Janela Deslizante
    const SAMPLES_LIMIT = 200; // Tamanho exato que a rede espera (10 segundos)
    const FREQUENCY = 20;      // 20Hz (20 leituras por segundo)
    let totalSamplesRead = 0;

    // Controles do Filtro de Suavização (Smoothing) para evitar o "efeito janela mista"
    let predictionHistory = [];
    const HISTORY_SIZE = 5; // Guarda as últimas 5 predições

    // --- PARÂMETROS DO Z-SCALE (Do treino no Python) ---
    const MEAN = { x: 0.66411304, y: 7.24604497, z: 0.39769742 };
    const STD = { x: 6.87627423, y: 6.73978606, z: 4.76110903 };

    // --- ETIQUETAS DAS ATIVIDADES ---
    const LABELS = ['Descendo Escadas', 'Correndo', 'Sentado', 'Em Pé', 'Subindo Escadas', 'Caminhando'];

    // --- ELEMENTOS DA INTERFACE ---
    const btnStart = document.getElementById('btnStart');
    const activityEl = document.getElementById('activity-result');
    const confidenceEl = document.getElementById('confidence-result');
    const logEl = document.getElementById('log');

    // Função auxiliar para encontrar a moda (atividade mais frequente no histórico)
    function getMode(arr) {
        return arr.sort((a,b) =>
            arr.filter(v => v===a).length - arr.filter(v => v===b).length
        ).pop();
    }

    // Função para manter o ecrã ligado durante a demonstração
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Wake Lock ativado! O ecrã não se apagará sozinho.');
                
                // Reaplica o Wake Lock caso o utilizador minimize a aba e volte
                document.addEventListener('visibilitychange', async () => {
                    if (wakeLock !== null && document.visibilityState === 'visible') {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                });
            }
        } catch (err) {
            console.error(`Erro no Wake Lock: ${err.name}, ${err.message}`);
        }
    }

    // Carrega a arquitetura e os pesos do modelo exportado
    async function loadModel() {
        try {
            logEl.innerText = "A carregar modelo...";
            model = await tf.loadLayersModel('./tfjs_model/model.json');
            logEl.innerText = "Modelo pronto para inferência!";
        } catch (err) {
            logEl.innerText = "Erro ao carregar modelo: " + err.message;
        }
    }

    // Executa a rede neuronal
    async function runInference() {
        if (!model || sensorBuffer.length < SAMPLES_LIMIT) return;

        try {
            const inputTensor = tf.tidy(() => {
                // Transforma o array de arrays [[x,y,z], ...] num Tensor 3D [batch=1, tempo=200, features=3]
                return tf.tensor3d([sensorBuffer], [1, SAMPLES_LIMIT, 3]);
            });

            // Faz a predição
            const prediction = model.predict(inputTensor);
            const scores = await prediction.data();
            
            // Calcula a confiança via Softmax (maior probabilidade)
            const maxScoreIndex = scores.indexOf(Math.max(...scores));
            const confidence = (scores[maxScoreIndex] * 100).toFixed(1);

            // Adiciona a predição ao histórico de suavização
            predictionHistory.push(maxScoreIndex);
            if (predictionHistory.length > HISTORY_SIZE) {
                predictionHistory.shift(); 
            }

            // Seleciona a moda para apresentar no ecrã
            const smoothedModeIndex = getMode([...predictionHistory]);

            activityEl.innerText = LABELS[smoothedModeIndex];
            
            // Avisa o utilizador se a confiança estiver baixa (fase de transição)
            if (parseFloat(confidence) < 50.0) {
                confidenceEl.innerText = `Confiança Baixa: ${confidence}%`;
                confidenceEl.style.color = 'var(--warning)'; 
            } else {
                confidenceEl.innerText = `Confiança: ${confidence}%`;
                confidenceEl.style.color = 'var(--accent-color)';
            }

            logEl.innerText = "A monitorizar em tempo real...";

            // Limpa a memória para evitar sobrecarga no telemóvel
            inputTensor.dispose();
            prediction.dispose();
        } catch (err) {
            logEl.innerText = "Erro na inferência: " + err.message;
        }
    }

    // Inicia a recolha de dados do Acelerómetro
    async function startSensors() {
        if (!('Accelerometer' in window)) {
            alert("Acelerómetro não suportado no teu navegador/telemóvel.");
            return;
        }

        try {
            const permission = await navigator.permissions.query({ name: 'accelerometer' });
            if (permission.state === 'denied') {
                alert("Acesso negado ao acelerómetro.");
                return;
            }

            // Pede para o ecrã ficar ligado
            await requestWakeLock();

            sensor = new Accelerometer({ frequency: FREQUENCY });

            sensor.addEventListener('reading', () => {
                // Normalização Dinâmica Z-Score (tal como no treino)
                let normX = (sensor.x - MEAN.x) / STD.x;
                let normY = (sensor.y - MEAN.y) / STD.y;
                let normZ = (sensor.z - MEAN.z) / STD.z;

                // Garante a estrutura correta dos eixos num sub-array
                sensorBuffer.push([normX, normY, normZ]);
                totalSamplesRead++;

                // JANELA DESLIZANTE (Mantém as últimas 200 amostras)
                if (sensorBuffer.length > SAMPLES_LIMIT) {
                    sensorBuffer.shift(); 
                }

                // Dispara a rede neuronal na cadência certa
                if (sensorBuffer.length < SAMPLES_LIMIT) {
                    // Interface durante os primeiros 10 segundos (Enchimento do buffer)
                    if (totalSamplesRead % 10 === 0) {
                        logEl.innerText = `A calibrar sensores: ${sensorBuffer.length} / 200`;
                    }
                } else if (totalSamplesRead % 20 === 0) {
                    // Após calibrar, faz 1 predição por segundo (a cada 20 novas amostras)
                    runInference();
                }
            });

            sensor.addEventListener('error', event => {
                logEl.innerText = "Erro no sensor: " + event.error.name;
            });

            sensor.start();
            btnStart.disabled = true;
            btnStart.innerText = "A capturar movimento...";

        } catch (error) {
            logEl.innerText = "Erro ao iniciar: " + error.message;
        }
    }

    // Botão de Start (Essencial para garantir permissões de áudio/sensores no iOS e em alguns Androids)
    btnStart.addEventListener('click', () => {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission()
                .then(response => {
                    if (response == 'granted') startSensors();
                })
                .catch(console.error);
        } else {
            startSensors();
        }
    });

    // Inicia o carregamento do modelo assim que a página abre
    loadModel();
    </script>
</body>
</html>
